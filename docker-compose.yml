version: "3.9"

services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
